<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>分享 · Guideflow</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <main class="main" style="grid-template-rows:auto 1fr;height:100vh">
    <div class="header">
      <h1>分享的对话</h1>
      <a class="btn" href="./index.html">返回助手</a>
    </div>
    <section class="chat-panel"><div class="chat-log" id="chatLog"><div class="muted" style="padding:20px">加载中…</div></div></section>
  </main>
  <script src="./vendor/marked.min.js"></script>
  <script src="./vendor/purify.min.js"></script>
  <script>
    const params = new URLSearchParams(location.search);
    const token = params.get('token');
    const API_BASE = params.get('api') || window.API_BASE || 'http://127.0.0.1:8001';
    function escapeHtml(t){return String(t??'').replace(/[&<>"']/g,s=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[s]));}
    function md(raw){
      let html; try{html=marked.parse(String(raw||''),{breaks:true});}catch{html=escapeHtml(raw);}
      return DOMPurify?DOMPurify.sanitize(html):html;
    }
    async function main(){
      const log=document.getElementById('chatLog');
      if(!token){log.innerHTML='<div class="muted" style="padding:20px">缺少 token</div>';return;}
      const resp=await fetch(`${API_BASE}/api/shared/${encodeURIComponent(token)}`);
      if(!resp.ok){log.innerHTML='<div class="muted" style="padding:20px">分享不存在或已失效</div>';return;}
      const data=await resp.json();
      document.querySelector('h1').textContent=data.title||'分享的对话';
      log.innerHTML=(data.messages||[]).map(m=>{
        if(m.role==='user') return `<div class="message user"><div class="tag">用户</div>${escapeHtml(m.content)}</div>`;
        const text=m.payload?.answer_markdown||m.content||'';
        return `<div class="message assistant"><div class="tag">AI</div><div class="answer">${md(text)}</div></div>`;
      }).join('')||'<div class="muted">空对话</div>';
    }
    main();
  </script>
</body>
</html>
