# 非密钥配置（API Key 请放在 .env）
# 优先级：环境变量 > config.yaml > 代码默认值

paths:
  pdf: "（2026.V3）NCCN临床 实践指南：B细胞淋巴瘤.pdf"
  knowledge_base: data/processed/dlbcl_knowledge_base.json
  bm25_index: data/indexes/bm25_index.pkl
  knowledge_graph: data/processed/knowledge_graph.json
  page_images: data/cache/page_images
  summary_cache: data/cache/page_summaries.json
  logs: logs/runs

# 双数据源（NCCN / CSCO）。未列出的字段回退到上方 paths（仅 nccn）或代码默认值。
sources:
  nccn:
    label: "NCCN B 细胞淋巴瘤指南"
    pdf: "（2026.V3）NCCN临床 实践指南：B细胞淋巴瘤.pdf"
    knowledge_base: data/processed/dlbcl_knowledge_base.json
    bm25_index: data/indexes/bm25_index.pkl
    knowledge_graph: data/processed/knowledge_graph.json
    enable_vlm: true
    enable_flowchart: true
    enable_kg: true
  csco:
    label: "CSCO 淋巴瘤诊疗指南 2025"
    pdf: "2025CSCO淋巴瘤诊疗指南(OCR).pdf"
    knowledge_base: data/processed/csco_knowledge_base.json
    bm25_index: data/indexes/csco_bm25_index.pkl
    knowledge_graph: data/processed/csco_knowledge_graph.json
    enable_vlm: false
    enable_flowchart: false
    enable_kg: false

qwen:
  base_url: https://dashscope.aliyuncs.com/compatible-mode/v1
  model: qwen-plus

vlm:
  base_url: https://dashscope.aliyuncs.com/compatible-mode/v1
  model: qwen-vl-max

reranker:
  model: lexical

retrieval:
  bm25_top_k: 40
  rerank_top_k: 16
  final_top_k: 6
  max_attached_refs: 6

# 疾病范围：auto=按问题自动识别（未命中则全库）；也可指定 dlbcl/fl/mcl/.../all
# 注册表见 backend/app/services/disease_scope.py
disease_scope: auto

graph:
  fanout: 3
  depth: 1
  reserve: 2

# 路由模式：agentic=工具调用智能体 | linear=旧线性流程（回退）
routing_mode: agentic
# 智能体工具循环最大步数
agent_max_steps: 4

# 送入 VLM 的图片安全上限（按需点名，不再写死“必须送几张”）
figure_ceiling: 4
max_images: 4
display_max_figures: 4
page_image_dpi: 150
enable_evidence_gating: true

crop:
  enabled: true
  # null 表示沿用 page_image_dpi
  dpi: null
  padding: 0.02
  min_area: 0.05
  prefer: auto   # auto=确定性几何优先 | vlm=VLM兜底调试 | detect=仅矢量图检测
  vlm_max_area: 0.8
  vlm_dedup_guard: true
